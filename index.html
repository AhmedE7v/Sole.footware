<!DOCTYPE html>
<html lang="en" dir="ltr"> <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soleé | FOOTWEAR</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <nav class="controls">
        <button id="lang-toggle" class="control-btn">العربية</button>
        
        <div class="theme-switch-wrapper">
            <label class="theme-switch" for="checkbox">
                <input type="checkbox" id="checkbox" />
                <div class="slider round">
                    <i class="fas fa-sun"></i>
                    <i class="fas fa-moon"></i>
                </div>
            </label>
        </div>
    </nav>

    <header>
        <div class="logo-container">
            <img src="logo.png" alt="Soleé" class="logo">
            <p class="tagline" data-key="tagline">FOOTWEAR</p>
        </div>
    </header>

    <main class="hero-section">
        <h1 data-key="hero_title">Elegance in Every Step</h1>
        <p data-key="hero_desc">Explore our exclusive collection of premium handcrafted footwear.</p>
        
        <a href="shop.html" class="cta-btn" data-key="cta_text" style="text-decoration: none; display: inline-block;">Shop Now</a>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
